appId: com.fluent.app
productName: Fluent
copyright: Copyright 2024

directories:
  output: release
  buildResources: assets

files:
  - dist/**/*
  - assets/**/*
  - src/renderer/**/*.html
  - "!**/*.ts"
  - "!**/*.map"

mac:
  target:
    - target: dmg
      arch:
        - arm64
  entitlements: assets/entitlements.mac.plist
  entitlementsInherit: assets/entitlements.mac.plist
  extendInfo:
    NSMicrophoneUsageDescription: "Fluent needs microphone access for speech-to-text dictation."

win:
  target:
    - target: dir
      arch:
        - x64
  icon: assets/icons/icon.ico
  signDlls: false
  sign: null

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true

npmRebuild: true
