appId: com.mywhisper.app
productName: My Whisper
copyright: Copyright 2024

directories:
  output: release
  buildResources: assets

files:
  - dist/**/*
  - assets/**/*
  - src/renderer/**/*.html
  - "!**/*.ts"
  - "!**/*.map"

win:
  target:
    - target: dir
      arch:
        - x64
  icon: assets/icons/icon.ico
  signDlls: false
  sign: null

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true

npmRebuild: true
